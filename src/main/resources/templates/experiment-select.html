<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>实验选择 - 变异测试系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="nav">
    <div class="nav-title">变异测试实验平台</div>
    <nav class="nav-links">
        <a th:href="@{/home}" th:classappend="${#httpServletRequest.requestURI == '/home'} ? 'active'">主界面</a>
        <a th:href="@{/algorithm}" th:classappend="${#httpServletRequest.requestURI == '/algorithm'} ? 'active'">算法简介</a>
        <a th:href="@{/experiment}" th:classappend="${#httpServletRequest.requestURI == '/experiment'} ? 'active'">实验演示</a>
    </nav>
    <div class="nav-right">
        <span class="user-pill" th:if="${session.user != null}">
            当前用户：<strong th:text="${session.user}">admin</strong>
        </span>
        <a th:href="@{/logout}" class="btn-secondary" style="padding:8px 14px;">退出</a>
    </div>
</header>
<main class="layout-center">
    <section class="card">
        <h1 class="page-title">实验选择</h1>
        <form th:action="@{/experiment/start}" method="post" class="form-vertical">
            <div class="form-group">
                <label for="system">测试系统</label>
                <select id="system" name="system" required>
                    <option value="P1">P1</option>
                    <option value="P2">P2</option>
                    <option value="P3">P3</option>
                </select>
            </div>
            <div class="form-group">
                <label for="project">测试项目</label>
                <select id="project" name="project" required>
                    <option value="TRANS">TRANS</option>
                    <option value="SORT">SORT</option>
                    <option value="SEARCH">SEARCH</option>
                </select>
            </div>
            <div class="form-group">
                <label for="language">编程语言</label>
                <select id="language" name="language" required>
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                    <option value="C">C</option>
                </select>
            </div>
            <div class="form-group form-actions">
                <button type="submit" class="btn-primary">开始测试</button>
            </div>
        </form>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
