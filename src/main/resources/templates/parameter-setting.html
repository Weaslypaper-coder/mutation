<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>实验参数设置 - 变异测试系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="nav">
    <div class="nav-title">变异测试实验平台</div>
    <nav class="nav-links">
        <a th:href="@{/home}" th:classappend="${currentPath == '/home'} ? 'active'">首页</a>
        <a th:href="@{/algorithm}" th:classappend="${currentPath == '/algorithm'} ? 'active'">算法简介</a>
        <a th:href="@{/experiment}" th:classappend="${currentPath.startsWith('/experiment')} ? 'active'">实验演示</a>
    </nav>
    <div class="nav-right">
        <span class="user-pill" th:if="${session.user != null}">
            当前用户：<strong th:text="${session.user}">admin</strong>
        </span>
        <a th:href="@{/logout}" class="btn-secondary" style="padding:8px 14px;">退出</a>
    </div>
</header>
<main class="layout-center">
    <section class="card">
        <h1 class="page-title">实验参数设置</h1>
        <div class="notice notice-success" th:if="${param.msg != null}">
            <div>
                <div class="notice-title">操作成功</div>
                <div class="notice-text" th:text="${param.msg[0]}">已完成操作。</div>
            </div>
            <div class="notice-actions">
                <a th:href="@{/experiment/program-test}" class="btn-secondary" style="padding:8px 14px;">返回实验工作台</a>
            </div>
        </div>

        <div class="notice notice-warn" th:if="${!expHasProgram}">
            <div>
                <div class="notice-title">前置条件未完成：未导入程序</div>
                <div class="notice-text">请先返回实验工作台完成“① 导入程序”，再进行参数配置。</div>
            </div>
            <div class="notice-actions">
                <a th:href="@{/experiment/program-test}" class="btn-primary" style="padding:8px 14px;">去导入程序</a>
            </div>
        </div>

        <div class="stepper">
            <div class="step" th:classappend="${expHasProgram} ? ' step-done' : ''">
                <div class="step-top"><div class="step-num">1</div><div class="step-title">导入程序</div></div>
                <div class="step-meta" th:text="${expHasProgram ? ('已导入：' + expProgramName) : '未导入'}">未导入</div>
            </div>
            <div class="step" th:classappend="${expHasMutants} ? ' step-done' : ''">
                <div class="step-top"><div class="step-num">2</div><div class="step-title">生成变异分支</div></div>
                <div class="step-meta" th:text="${expHasMutants ? ('已生成：' + expMutantCount) : '未生成'}">未生成</div>
            </div>
            <div class="step step-active" th:classappend="${expHasParameter} ? ' step-done' : ''">
                <div class="step-top"><div class="step-num">3</div><div class="step-title">参数设置</div></div>
                <div class="step-meta" th:text="${expHasParameter ? '已保存参数' : '正在配置'}">正在配置</div>
            </div>
            <div class="step"><div class="step-top"><div class="step-num">4</div><div class="step-title">相关度热力图</div></div><div class="step-meta">查看相关度矩阵</div></div>
            <div class="step"><div class="step-top"><div class="step-num">5</div><div class="step-title">相关图</div></div><div class="step-meta">构建图结构</div></div>
            <div class="step" th:classappend="${expHasModelResult} ? ' step-done' : ''"><div class="step-top"><div class="step-num">6</div><div class="step-title">模型训练</div></div><div class="step-meta" th:text="${expHasModelResult ? '已有训练结果' : '未训练'}">未训练</div></div>
            <div class="step"><div class="step-top"><div class="step-num">7</div><div class="step-title">生成测试数据</div></div><div class="step-meta">生成效率统计</div></div>
        </div>

        <form th:action="@{/parameter/save}" method="post" class="form-vertical">
            <div class="form-group">
                <label for="populationSize">初始种群数量（1-10）</label>
                <input id="populationSize" name="populationSize" type="number" min="1" max="10"
                       th:value="${parameter != null} ? ${parameter.populationSize} : 5" required>
            </div>
            <div class="form-group">
                <label for="encodingType">编码方式</label>
                <select id="encodingType" name="encodingType">
                    <option value="Binary" th:selected="${parameter != null and parameter.encodingType == 'Binary'}">Binary</option>
                    <option value="Gray" th:selected="${parameter != null and parameter.encodingType == 'Gray'}">Gray</option>
                    <option value="Real" th:selected="${parameter != null and parameter.encodingType == 'Real'}">Real</option>
                </select>
            </div>
            <div class="form-group">
                <label for="crossoverRate">交叉概率（0-1）</label>
                <input id="crossoverRate" name="crossoverRate" type="number" min="0" max="1" step="0.01"
                       th:value="${parameter != null} ? ${parameter.crossoverRate} : 0.8" required>
            </div>
            <div class="form-group">
                <label for="mutationRate">变异概率（0-1）</label>
                <input id="mutationRate" name="mutationRate" type="number" min="0" max="1" step="0.01"
                       th:value="${parameter != null} ? ${parameter.mutationRate} : 0.1" required>
            </div>
            <div class="form-group">
                <label for="sampleSize">样本数量</label>
                <select id="sampleSize" name="sampleSize">
                    <option value="500">500</option>
                    <option value="600">600</option>
                    <option value="700">700</option>
                    <option value="800">800</option>
                    <option value="900">900</option>
                    <option value="1000">1000</option>
                </select>
            </div>
            <div class="form-group form-actions">
                <button type="submit" class="btn-primary">保存参数</button>
            </div>
        </form>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
