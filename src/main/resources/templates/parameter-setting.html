<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>实验参数设置 - 变异测试系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="nav">
    <div class="nav-title">变异测试实验平台</div>
    <nav class="nav-links">
        <a th:href="@{/home}" th:classappend="${#httpServletRequest.requestURI == '/home'} ? 'active'">主界面</a>
        <a th:href="@{/algorithm}" th:classappend="${#httpServletRequest.requestURI == '/algorithm'} ? 'active'">算法简介</a>
        <a th:href="@{/experiment}" th:classappend="${#httpServletRequest.requestURI.startsWith('/experiment')} ? 'active'">实验演示</a>
    </nav>
    <div class="nav-right">
        <span class="user-pill" th:if="${session.user != null}">
            当前用户：<strong th:text="${session.user}">admin</strong>
        </span>
        <a th:href="@{/logout}" class="btn-secondary" style="padding:8px 14px;">退出</a>
    </div>
</header>
<main class="layout-center">
    <section class="card">
        <h1 class="page-title">实验参数设置</h1>
        <form th:action="@{/parameter/save}" method="post" class="form-vertical">
            <div class="form-group">
                <label for="populationSize">初始种群数量（1-10）</label>
                <input id="populationSize" name="populationSize" type="number" min="1" max="10"
                       th:value="${parameter != null} ? ${parameter.populationSize} : 5" required>
            </div>
            <div class="form-group">
                <label for="encodingType">编码方式</label>
                <select id="encodingType" name="encodingType">
                    <option value="Binary" th:selected="${parameter != null and parameter.encodingType == 'Binary'}">Binary</option>
                    <option value="Gray" th:selected="${parameter != null and parameter.encodingType == 'Gray'}">Gray</option>
                    <option value="Real" th:selected="${parameter != null and parameter.encodingType == 'Real'}">Real</option>
                </select>
            </div>
            <div class="form-group">
                <label for="crossoverRate">交叉概率（0-1）</label>
                <input id="crossoverRate" name="crossoverRate" type="number" min="0" max="1" step="0.01"
                       th:value="${parameter != null} ? ${parameter.crossoverRate} : 0.8" required>
            </div>
            <div class="form-group">
                <label for="mutationRate">变异概率（0-1）</label>
                <input id="mutationRate" name="mutationRate" type="number" min="0" max="1" step="0.01"
                       th:value="${parameter != null} ? ${parameter.mutationRate} : 0.1" required>
            </div>
            <div class="form-group">
                <label for="sampleSize">样本数量</label>
                <select id="sampleSize" name="sampleSize">
                    <option value="500">500</option>
                    <option value="600">600</option>
                    <option value="700">700</option>
                    <option value="800">800</option>
                    <option value="900">900</option>
                    <option value="1000">1000</option>
                </select>
            </div>
            <div class="form-group form-actions">
                <button type="submit" class="btn-primary">保存参数</button>
            </div>
        </form>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
